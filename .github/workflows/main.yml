name: TheScraper

on:
  workflow_dispatch:
    inputs:
      page_url:
        description: 'Social media page URL (Facebook or Twitter/X)'
        required: true
        type: string
      max_posts:
        description: 'Maximum number of posts to scrape'
        required: false
        default: '100'
        type: string
      output_filename:
        description: 'Output filename (optional)'
        required: false
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
#      - name: Install Chrome for Selenium
#        run: |
#          sudo apt-get update
#          sudo apt-get install -y chromium-browser chromium-chromedriver

      - name: Run scraper
        env:
#          FACEBOOK_EMAIL: ${{ secrets.FACEBOOK_EMAIL || '' }}
#          FACEBOOK_PASSWORD: ${{ secrets.FACEBOOK_PASSWORD || '' }}
          FACEBOOK_COOKIES_JSON: ${{ secrets.FACEBOOK_COOKIES_JSON || '' }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN || '' }}
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY || '' }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET || '' }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN || '' }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET || '' }}
          MAX_POSTS: ${{ github.event.inputs.max_posts }}
        run: |
          python main.py "${{ github.event.inputs.page_url }}" \
            --max-posts ${{ github.event.inputs.max_posts }} \
            --verbose

      
      - name: Upload output files
        uses: actions/upload-artifact@v4
        with:
          name: Outputs
          path: |
            output/*.md
            logs/
          retention-days: 30
        if: always()
      
      - name: Create commit and push
        run: |
          git config user.name "TheScraper Bot"
          git config user.email "thescraper@bot.local"
          git add output/*.md || true
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "chore: Add scraped posts from GitHub Actions"
            git push
          )
        if: always()
