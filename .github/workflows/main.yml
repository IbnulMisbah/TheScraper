name: TheScraper

on:
  workflow_dispatch:
    inputs:
      page_url:
        description: 'Facebook page URL'
        required: true
        type: string
      max_posts:
        description: 'Maximum posts to scrape'
        required: false
        default: '100'
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run scraper
        env:
          FACEBOOK_COOKIES_JSON: ${{ secrets.FACEBOOK_COOKIES_JSON }}
          MAX_POSTS: ${{ github.event.inputs.max_posts }}
        run: |
          python main.py "${{ github.event.inputs.page_url }}" \
            --max-posts ${{ github.event.inputs.max_posts }} \
            --verbose
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraper-output
          path: |
            output/*.md
            logs/
          retention-days: 30
