name: TheScraper

on:
  workflow_dispatch:
    inputs:
      page_url:
        description: 'Facebook page URL'
        required: true
        type: string
      max_posts:
        description: 'Maximum posts to scrape'
        required: false
        default: '100'
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libglib2.0-0 libx11-6 libx11-xcb1 libxcb1 libxext6 libxdamage1 \
            libxfixes3 libxkbcommon0 libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 libatk1.0-0 libatk-bridge2.0-0 libgtk-3-0 \
            libgbm1 libnss3 libxss1 libasound2 libxshmfence1 libdrm2 libxrandr2
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Playwright
        run: |
          python -m playwright install chromium
      
      - name: Run scraper
        env:
          FACEBOOK_COOKIES_JSON: ${{ secrets.FACEBOOK_COOKIES_JSON }}
          MAX_POSTS: ${{ github.event.inputs.max_posts }}
        run: |
          python main.py "${{ github.event.inputs.page_url }}" \
            --max-posts ${{ github.event.inputs.max_posts }} \
            --verbose
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scraper-output
          path: |
            output/*.md
            logs/
          retention-days: 30
